endpoint:
  url: "http://localhost:8000"
  api_format: "openai"
  api_key_env: ""              # env var name holding LLM endpoint API key (e.g. OPENAI_API_KEY)

dataset:
  source: "huggingface://HuggingFaceH4/ultrachat_200k"
  max_samples: 1000
  split: "train_sft"
  schema: ""
  hf_token_env: ""             # env var name holding HuggingFace token (e.g. HF_TOKEN)

request:
  model_override: ""
  max_tokens: 256
  temperature: 0.7
  stream: false

locust:
  users: 10
  spawn_rate: 2
  run_time: ""
